        .tabs{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
        .tab{border:1px solid var(--border);background:#fff;border-radius:999px;padding:9px 14px;font-size:13px;color:var(--muted);cursor:pointer}

        .panel{margin-top:12px}

        @media (max-width: 960px){

    </style>

<script>
    const $ = (id) => document.getElementById(id);
    const NO_DATA_TEXT = '\u65e0\u6570\u636e';
    const NOT_READY_TEXT = '\u672a\u751f\u6210';

    const log = (s) => {
        const el = $('log');
        el.value = (el.value ? el.value + "\n" : "") + s;
        el.scrollTop = el.scrollHeight;
    };

    async function jget(url) {
        const r = await fetch(url);
        if (!r.ok) {
            const t = await r.text().catch(() => "");
            throw new Error(`${r.status} ${r.statusText} :: ${t}`);
        }
        return r.json();
    }

    async function jpost(url, formData) {
        const r = await fetch(url, { method: 'POST', body: formData });
        if (!r.ok) {
            const t = await r.text().catch(() => "");
            throw new Error(`${r.status} ${r.statusText} :: ${t}`);
        }
        return r.json();
    }

    function setBadge(id, val) {
        $(id).textContent = (val === null || val === undefined || val === "") ? "-" : String(val);
    }

    function fillSelect(sel, arr, getVal = (x) => x, getLabel = (x) => x) {
        sel.innerHTML = '';
        (arr || []).forEach(x => {
            const opt = document.createElement('option');
            opt.value = getVal(x);
            opt.textContent = getLabel(x);
            sel.appendChild(opt);
        });
    }

    function filteredBranches(all, kw) {
        if (!kw) return all;
        const k = kw.trim().toLowerCase();
        return all.filter(x => String(x).toLowerCase().includes(k));
    }

    function getSelectedValues(sel) {
        if (!sel) return [];
        return Array.from(sel.selectedOptions).map(o => o.value);
    }

    function getMultiSelected(sel) {
        if (!sel) return [];
        if (sel.tagName && sel.tagName.toLowerCase() === 'select') {
            return Array.from(sel.selectedOptions || [])
                .map(o => (o.value || '').trim())
                .filter(v => v);
        }
        const val = (sel.value || '').trim();
        if (!val) return [];
        return val.split(',').map(s => s.trim()).filter(Boolean);
    }

    function setMultiSelected(sel, values) {
        if (!sel) return;
        const arr = Array.isArray(values) ? values : (values == null ? [] : [String(values)]);
        if (sel.tagName && sel.tagName.toLowerCase() === 'select') {
            const set = new Set(arr.map(v => String(v)));
            Array.from(sel.options || []).forEach(o => {
                o.selected = set.has(String(o.value));
            });
            sel.dispatchEvent(new Event('change'));
            return;
        }
        if (typeof sel.value !== 'undefined') {
            sel.value = arr.join(',');
            sel.dispatchEvent(new Event('change'));
        }
    }

    function toScopeOption(raw) {
        if (typeof raw === 'string') {
            return { key: raw, name: raw, minDate: '', maxDate: '', totalRows: 0, rowsOnTargetDate: 0 };
        }
        return {
            key: String(raw?.key ?? ''),
            name: String(raw?.name ?? raw?.key ?? ''),
            minDate: String(raw?.minDate ?? ''),
            maxDate: String(raw?.maxDate ?? ''),
            totalRows: Number(raw?.totalRows ?? 0),
            rowsOnTargetDate: Number(raw?.rowsOnTargetDate ?? 0)
        };
    }

    function metricCode(m) {
        return String(m?.metric ?? m?.key ?? '').trim();
    }

    function metricAvailable(m) {
        return m?.available !== false;
    }

    function metricLabel(m) {
        const code = metricCode(m);
        const kind = String(m?.kind || '').toUpperCase();
        const kindTip = kind === 'DELTA' ? 'DELTA' : (kind === 'LEVEL' ? 'LEVEL' : (kind === 'RATE' ? 'RATE' : ''));
        const availability = metricAvailable(m) ? '' : ` / ${NOT_READY_TEXT}`;
        return `${(m?.name ?? code)} (${code}${kindTip ? ' / ' + kindTip : ''}${availability})`;
    }

    function renderEmptyChart(chart, title, message) {
        chart.clear();
        chart.setOption({
            animation: false,
            title: {
                text: title || '',
                left: 'center',
                top: '42%',
                textStyle: { fontSize: 16, fontWeight: 700 }
            },
            graphic: [{
                type: 'text',
                left: 'center',
                top: '54%',
                style: {
                    text: message || NO_DATA_TEXT,
                    fill: '#6b7280',
                    font: '14px sans-serif'
                }
            }],
            xAxis: { show: false },
            yAxis: { show: false },
            series: []
        }, true);
    }

    let SCOPE_OPTIONS = [];
    let ALL_BRANCHES = [];
    let METRIC_OPTIONS = [];

    const heatChart = echarts.init($('heatChart'));
    const trendChart = echarts.init($('trendChart'));
    const growthChart = echarts.init($('growthChart'));

    function normalizeBranchName(name) {
        return String(name || '')
            .replace(/\n/g, '')
            .replace(/[：:。．\.]/g, '')
            .replace(/\s+/g, '')
            .trim();
    }

    function normalizeBranchOptions(branches) {
        const unique = [];
        const seen = new Set();
        (branches || []).forEach(raw => {
            const n = normalizeBranchName(raw);
            if (!n || n.includes('\u5408\u8ba1')) return;
            if (seen.has(n)) return;
            seen.add(n);
            unique.push(n);
        });
        unique.sort((a, b) => a.localeCompare(b, 'zh-Hans-CN'));
        return unique;
    }

    function getScopeName(scopeKey) {
        const hit = (SCOPE_OPTIONS || []).find(x => String(x.key) === String(scopeKey));
        return hit?.name || scopeKey || '';
    }

    function findMetricDef(metric) {
        return (METRIC_OPTIONS || []).find(m => metricCode(m) === String(metric || ''));
    }

    function preferredMetricPool() {
        const available = (METRIC_OPTIONS || []).filter(metricAvailable);
        const nonCalc = available.filter(m => !metricCode(m).toUpperCase().startsWith('CALC_'));
        return nonCalc.length ? nonCalc : available;
    }

    function pickGrowthDefaults() {
        const currentDelta = ($('deltaSel')?.value || $('deltaMetric')?.value || '').trim();
        const def = findMetricDef(currentDelta);
        if (def?.baseMetric) {
            $('baseSel').value = def.baseMetric;
            $('baseMetric').value = def.baseMetric;
            return;
        }
        const fallback = preferredMetricPool().find(m => String(m.kind || '').toUpperCase() === 'LEVEL') || preferredMetricPool()[0];
        if (fallback) {
            const m = metricCode(fallback);
            $('baseSel').value = m;
            $('baseMetric').value = m;
        }
    }

    function activeTab(name) {
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
        document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
        $('panel-' + name)?.classList.remove('hidden');
        setTimeout(() => {
            heatChart.resize();
            trendChart.resize();
            growthChart.resize();
        }, 0);
    }

    function renderMultiLine(chart, title, x, series, unit) {
        const xSorted = [...(x || [])].sort();
        const safeSeries = (series || []).map(s => {
            const values = s?.data || s?.y || [];
            const safeY = xSorted.map((_, idx) => {
                const v = values[idx];
                const n = Number(v);
                return Number.isFinite(n) ? n : null;
            });
            return {
                type: 'line',
                name: s?.name || '-',
                data: safeY,
                smooth: true,
                showSymbol: false,
                connectNulls: false,
                emphasis: { focus: 'series' }
            };
        });

        const nonNullPoints = safeSeries.reduce((acc, s) => acc + s.data.filter(v => v !== null).length, 0);
        if (safeSeries.length === 0 || nonNullPoints === 0) {
            renderEmptyChart(chart, title || 'Trend', `${NO_DATA_TEXT} - adjust filters`);
            return;
        }

        chart.setOption({
            animation: false,
            title: { text: title || '' },
            tooltip: {
                trigger: 'axis',
                valueFormatter: (v) => (v === null || v === undefined) ? NO_DATA_TEXT : `${v}${unit ? ' ' + unit : ''}`
            },
            legend: { type: 'scroll', top: 28 },
            grid: { left: 60, right: 24, top: 76, bottom: 70 },
            xAxis: { type: 'category', data: xSorted },
            yAxis: { type: 'value', name: unit || '' },
            dataZoom: [
                { type: 'inside', xAxisIndex: 0 },
                { type: 'slider', xAxisIndex: 0, height: 18, bottom: 20 }
            ],
            series: safeSeries
        }, true);
    }

    function renderHeatmap(resp) {
        const x = resp?.x || resp?.metrics || [];
        const y = resp?.y || resp?.branches || [];
        const data = resp?.data || [];
        const title = resp?.title || `Heatmap: ${getScopeName(resp?.scope || $('scopeSel')?.value || '')}`;
        const unit = resp?.unit || '';
        const allNull = !!resp?.meta?.allNull;

        if (allNull || !data.length) {
            renderEmptyChart(heatChart, title, '\u5f53\u524d\u65e5\u671f/\u53e3\u5f84/\u6307\u6807\u4e0b\u65e0\u6570\u636e\uff0c\u8bf7\u8c03\u6574\u67e5\u8be2\u6761\u4ef6');
            return;
        }

        const valuedData = data
            .filter(d => Array.isArray(d) && d[3] === true && Number.isFinite(Number(d[2])))
            .map(d => [d[0], d[1], Number(d[2]), true]);
        const nullData = data
            .filter(d => Array.isArray(d) && d[3] !== true)
            .map(d => [d[0], d[1], 0, false]);

        if (!valuedData.length) {
            renderEmptyChart(heatChart, title, '\u5f53\u524d\u65e5\u671f/\u53e3\u5f84/\u6307\u6807\u4e0b\u65e0\u6570\u636e\uff0c\u8bf7\u8c03\u6574\u67e5\u8be2\u6761\u4ef6');
            return;
        }

        let min = Number.isFinite(resp?.min) ? Number(resp.min) : Math.min(...valuedData.map(d => d[2]));
        let max = Number.isFinite(resp?.max) ? Number(resp.max) : Math.max(...valuedData.map(d => d[2]));
        if (min === max) {
            max = min + 1;
        }

        heatChart.setOption({
            animation: false,
            title: { text: title },
            tooltip: {
                position: 'top',
                formatter: (p) => {
                    const point = Array.isArray(p?.data) ? p.data : [];
                    const hasData = point[3] === true;
                    const valText = hasData ? point[2] : NO_DATA_TEXT;
                    return `${y[point[1]] || ''}<br/>${x[point[0]] || ''}: ${valText}${hasData && unit ? ' ' + unit : ''}`;
                }
            },
            grid: { left: 130, right: 42, top: 56, bottom: 100 },
            xAxis: {
                type: 'category',
                data: x,
                splitArea: { show: true },
                axisLabel: { rotate: 30 }
            },
            yAxis: {
                type: 'category',
                data: y,
                splitArea: { show: true }
            },
            visualMap: {
                min,
                max,
                seriesIndex: 1,
                calculable: true,
                orient: 'horizontal',
                left: 'center',
                bottom: 50,
                inRange: { color: ['#e0f2fe', '#38bdf8', '#0f766e', '#f59e0b', '#b91c1c'] }
            },
            dataZoom: [
                { type: 'inside', yAxisIndex: 0 },
                { type: 'inside', xAxisIndex: 0 },
                { type: 'slider', yAxisIndex: 0, right: 10 },
                { type: 'slider', xAxisIndex: 0, height: 16, bottom: 20 }
            ],
            series: [
                {
                    name: 'noData',
                    type: 'heatmap',
                    data: nullData,
                    silent: true,
                    itemStyle: { color: '#e5e7eb' },
                    emphasis: { disabled: true },
                    label: { show: false }
                },
                {
                    name: 'value',
                    type: 'heatmap',
                    data: valuedData,
                    label: { show: false },
                    emphasis: { itemStyle: { shadowBlur: 8, shadowColor: 'rgba(0,0,0,0.25)' } }
                }
            ]
        }, true);
    }

    function fillMetricSelectWithAvailability(sel, list, filterFn = () => true) {
        const prev = sel?.multiple ? getMultiSelected(sel) : [sel?.value || ''];
        const rows = (list || []).filter(filterFn);
        sel.innerHTML = '';

        rows.forEach(m => {
            const code = metricCode(m);
            const opt = document.createElement('option');
            opt.value = code;
            opt.textContent = metricLabel(m);
            if (!metricAvailable(m)) {
                opt.disabled = true;
                opt.style.color = '#9ca3af';
            }
            sel.appendChild(opt);
        });

        const activeCodes = rows.filter(metricAvailable).map(metricCode);
        if (sel.multiple) {
            const keep = prev.filter(v => activeCodes.includes(v));
            setMultiSelected(sel, keep);
        } else {
            const next = activeCodes.find(v => prev.includes(v)) || activeCodes[0] || '';
            sel.value = next;
        }
    }

    function applyMetricDefaults() {
        const pool = preferredMetricPool();
        const firstMetric = pool[0] ? metricCode(pool[0]) : '';
        if (firstMetric) {
            $('metricSel').value = firstMetric;
        }

        const heatDefaults = pool.slice(0, 3).map(metricCode);
        if (getMultiSelected($('heatMetricsSel')).length === 0 && heatDefaults.length) {
            setMultiSelected($('heatMetricsSel'), heatDefaults);
            $('heatMetrics').value = heatDefaults.join(',');
        }

        const deltaCandidates = pool.filter(m => ['DELTA', 'LEVEL'].includes(String(m.kind || '').toUpperCase()));
        const baseCandidates = pool.filter(m => String(m.kind || '').toUpperCase() === 'LEVEL');
        if (deltaCandidates.length) {
            $('deltaSel').value = metricCode(deltaCandidates[0]);
            $('deltaMetric').value = $('deltaSel').value;
        }
        if (baseCandidates.length) {
            $('baseSel').value = metricCode(baseCandidates[0]);
            $('baseMetric').value = $('baseSel').value;
        }

        pickGrowthDefaults();
    }

    async function loadMetricsForScope(scope) {
        const rows = await jget('/api/metrics?scope=' + encodeURIComponent(scope || ''));
        METRIC_OPTIONS = Array.isArray(rows) ? rows : [];

        fillMetricSelectWithAvailability($('metricSel'), METRIC_OPTIONS);
        fillMetricSelectWithAvailability($('heatMetricsSel'), METRIC_OPTIONS);
        fillMetricSelectWithAvailability($('deltaSel'), METRIC_OPTIONS, m => ['DELTA', 'LEVEL'].includes(String(m.kind || '').toUpperCase()));
        fillMetricSelectWithAvailability($('baseSel'), METRIC_OPTIONS, m => String(m.kind || '').toUpperCase() === 'LEVEL');

        if (!$('deltaSel').value) {
            fillMetricSelectWithAvailability($('deltaSel'), METRIC_OPTIONS);
        }
        if (!$('baseSel').value) {
            fillMetricSelectWithAvailability($('baseSel'), METRIC_OPTIONS);
        }

        applyMetricDefaults();
    }

    async function loadBranchesForScope(scope) {
        ALL_BRANCHES = normalizeBranchOptions(await jget('/api/branches?scope=' + encodeURIComponent(scope || '')));
        if (ALL_BRANCHES.length === 0) {
            const debug = await jget('/api/branches/debug?scope=' + encodeURIComponent(scope || ''));
            log('[WARN] branches=0: ' + JSON.stringify(debug));
        }
        $('branchSearch').value = '';
        renderBranchList();
        setBadge('badgeBranchCnt', ALL_BRANCHES.length);
    }

    function pickInitialScope(scopeRows) {
        const withDateData = scopeRows.find(s => Number(s.rowsOnTargetDate || 0) > 0);
        if (withDateData?.key) return withDateData.key;
        const withAny = scopeRows.find(s => Number(s.totalRows || 0) > 0);
        if (withAny?.key) return withAny.key;
        return scopeRows[0]?.key || '';
    }

    async function refreshMeta() {
        $('badgeStatus').textContent = 'Loading...';
        try {
            const dr = await jget('/api/dateRange');
            if (dr && dr.hasData && dr.min && dr.max) {
                setBadge('badgeRange', `${dr.min} ~ ${dr.max}`);
                $('start').value = dr.min;
                $('end').value = dr.max;
                $('heatDate').value = dr.max;
            } else {
                setBadge('badgeRange', '-');
                $('start').value = '';
                $('end').value = '';
                $('heatDate').value = '';
                log('[INFO] no data, import excel first');
            }

            const scopesRaw = await jget('/api/scopes');
            SCOPE_OPTIONS = (Array.isArray(scopesRaw) ? scopesRaw : []).map(toScopeOption).filter(x => x.key);
            fillSelect($('scopeSel'), SCOPE_OPTIONS, x => x.key, x => x.name);

            const defaultScope = pickInitialScope(SCOPE_OPTIONS);
            if (defaultScope) {
                $('scopeSel').value = defaultScope;
                setBadge('badgeScope', getScopeName(defaultScope));
                await loadMetricsForScope(defaultScope);
                await loadBranchesForScope(defaultScope);
            }

            if (dr?.hasData && !SCOPE_OPTIONS.some(s => Number(s.rowsOnTargetDate || 0) > 0)) {
                log('[WARN] default date has no data in all scopes');
            }

            $('badgeStatus').textContent = 'Ready';
            log(`[OK] meta loaded: scopes=${SCOPE_OPTIONS.length} metrics=${METRIC_OPTIONS.length} branches=${ALL_BRANCHES.length}`);
        } catch (e) {
            $('badgeStatus').textContent = 'Init Failed';
            log(`[ERR] init failed: ${e.message}`);
            console.error(e);
        }
    }

    function renderBranchList() {
        const kw = $('branchSearch').value || '';
        const list = filteredBranches(ALL_BRANCHES, kw);
        const sel = $('branchMulti');
        const keep = new Set(getSelectedValues(sel));
        sel.innerHTML = '';
        list.forEach(b => {
            const opt = document.createElement('option');
            opt.value = b;
            opt.textContent = b;
            if (keep.has(b)) opt.selected = true;
            sel.appendChild(opt);
        });
        setBadge('badgeBranchCnt', ALL_BRANCHES.length);
    }

    async function waitJob(jobId) {
        while (true) {
            const job = await jget('/api/job/' + encodeURIComponent(jobId));
            if (job.status === 'SUCCESS' || job.status === 'FAILED' || job.status === 'NOT_FOUND') return job;
            await new Promise(r => setTimeout(r, 1200));
        }
    }

    async function doUpload() {
        const files = $('fileInput').files;
        if (!files || files.length === 0) {
            log('[WARN] no file selected');
            return;
        }

        const fd = new FormData();
        Array.from(files).forEach(f => fd.append('files', f));
        $('btnUpload').disabled = true;
        try {
            log(`[INFO] uploading ${files.length} files`);
            const res = await jpost('/api/upload', fd);
            log('[INFO] job submitted: ' + res.jobId);
            const done = await waitJob(res.jobId);
            log('[OK] upload done: ' + JSON.stringify(done));
            await refreshMeta();
        } catch (e) {
            log('[ERR] upload failed: ' + e.message);
            console.error(e);
        } finally {
            $('btnUpload').disabled = false;
        }
    }

    async function doHeat() {
        try {
            const scope = $('scopeSel').value || '';
            const date = $('heatDate').value || '';
            let metrics = ($('heatMetrics').value || '').trim();
            const selVals = getMultiSelected($('heatMetricsSel'));
            if (selVals.length) metrics = selVals.join(',');
            if (!date) {
                log('[WARN] heatmap date required');
                return;
            }
            if (!metrics) {
                log('[WARN] heatmap metrics required');
                return;
            }

            const url = `/api/heatmap?scope=${encodeURIComponent(scope)}&date=${encodeURIComponent(date)}&metrics=${encodeURIComponent(metrics)}`;
            const resp = await jget(url);
            renderHeatmap(resp);
            if (resp?.meta?.allNull) {
                log('[INFO] no data for current date/scope/metric');
            } else {
                log(`[OK] heatmap refreshed, dataRowCount=${resp?.meta?.dataRowCount ?? 0}`);
            }
        } catch (e) {
            log('[ERR] heatmap failed: ' + e.message);
            console.error(e);
        }
    }

    async function doTrendMulti() {
        try {
            const scope = $('scopeSel').value || '';
            const metric = $('metricSel').value || '';
            const start = $('start').value || '';
            const end = $('end').value || '';
            if (!metric) {
                log('[WARN] metric required');
                return;
            }
            const branchArr = getSelectedValues($('branchMulti'));
            const picked = branchArr.length ? branchArr : ALL_BRANCHES;
            const branches = picked.join(',');
            const url = `/api/trend/multi?scope=${encodeURIComponent(scope)}&metric=${encodeURIComponent(metric)}&start=${encodeURIComponent(start)}&end=${encodeURIComponent(end)}&branches=${encodeURIComponent(branches)}`;
            const resp = await jget(url);
            (resp?.warnings || []).forEach(w => log('[WARN] ' + w));
            if (resp?.meta?.truncated) {
                log(`[WARN] branches truncated: ${resp.meta.requestedBranches} -> ${resp.meta.effectiveBranches}`);
            }
            if (resp?.meta?.allNull) {
                renderEmptyChart(trendChart, resp.title || `Trend: ${scope} / ${metric}`, `${NO_DATA_TEXT}, adjust filters`);
                log('[INFO] trend no data');
                return;
            }
            renderMultiLine(trendChart, resp.title || `Trend: ${scope} / ${metric}`, resp.x || [], resp.series || [], resp.unit || '');
            log(`[OK] trend refreshed, dataRowCount=${resp?.meta?.dataRowCount ?? 0}`);
        } catch (e) {
            log('[ERR] trend failed: ' + e.message);
            console.error(e);
        }
    }

    async function doGrowth() {
        try {
            const scope = $('scopeSel').value || '';
            const start = $('start').value || '';
            const end = $('end').value || '';
            const branchArr = getSelectedValues($('branchMulti'));
            const picked = branchArr.length ? branchArr : ALL_BRANCHES;
            const branches = picked.join(',');

            let deltaMetric = ($('deltaMetric').value || '').trim();
            const ds = ($('deltaSel')?.value || '').trim();
            if (ds) deltaMetric = ds;

            let baseMetric = ($('baseMetric').value || '').trim();
            const bs = ($('baseSel')?.value || '').trim();
            if (bs) baseMetric = bs;

            if (!deltaMetric || !baseMetric) {
                log('[WARN] growth needs deltaMetric and baseMetric');
                return;
            }

            const url = `/api/growth?scope=${encodeURIComponent(scope)}&deltaMetric=${encodeURIComponent(deltaMetric)}&baseMetric=${encodeURIComponent(baseMetric)}&start=${encodeURIComponent(start)}&end=${encodeURIComponent(end)}&branches=${encodeURIComponent(branches)}`;
            const resp = await jget(url);
            (resp?.warnings || []).forEach(w => log('[WARN] ' + w));
            if (resp?.meta?.truncated) {
                log(`[WARN] branches truncated: ${resp.meta.requestedBranches} -> ${resp.meta.effectiveBranches}`);
            }
            if (resp?.meta?.allNull) {
                renderEmptyChart(growthChart, resp.title || `Growth: ${scope}`, `${NO_DATA_TEXT}, adjust filters`);
                log('[INFO] growth no data');
                return;
            }
            renderMultiLine(growthChart, resp.title || `Growth: ${scope}`, resp.x || [], resp.series || [], resp.unit || '');
            log(`[OK] growth refreshed, dataRowCount=${resp?.meta?.dataRowCount ?? 0}`);
        } catch (e) {
            log('[ERR] growth failed: ' + e.message);
            console.error(e);
        }
    }

    document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => activeTab(t.dataset.tab)));
    $('btnUpload').addEventListener('click', doUpload);
    $('btnRefresh').addEventListener('click', refreshMeta);
    $('btnHeat').addEventListener('click', doHeat);

    $('btnHeatPickAll')?.addEventListener('click', () => {
        const codes = preferredMetricPool().map(metricCode);
        setMultiSelected($('heatMetricsSel'), codes);
        $('heatMetrics').value = codes.join(',');
    });

    $('btnHeatPickNone')?.addEventListener('click', () => {
        setMultiSelected($('heatMetricsSel'), []);
        $('heatMetrics').value = '';
    });

    $('btnHeatPickDefault')?.addEventListener('click', () => {
        const defaults = preferredMetricPool().slice(0, 3).map(metricCode);
        setMultiSelected($('heatMetricsSel'), defaults);
        $('heatMetrics').value = defaults.join(',');
    });

    $('btnTrend').addEventListener('click', doTrendMulti);
    $('btnGrowth').addEventListener('click', doGrowth);

    $('scopeSel').addEventListener('change', async () => {
        const scope = $('scopeSel').value || '';
        setBadge('badgeScope', getScopeName(scope) || '-');
        try {
            await loadMetricsForScope(scope);
            await loadBranchesForScope(scope);
            log(`[OK] scope switched: ${scope}, metrics=${METRIC_OPTIONS.length}, branches=${ALL_BRANCHES.length}`);
        } catch (e) {
            log('[ERR] scope switch failed: ' + e.message);
        }
    });

    $('branchSearch').addEventListener('input', renderBranchList);
    $('btnSelectAll').addEventListener('click', () => Array.from($('branchMulti').options).forEach(o => o.selected = true));
    $('btnClear').addEventListener('click', () => Array.from($('branchMulti').options).forEach(o => o.selected = false));

    window.addEventListener('resize', () => {
        heatChart.resize();
        trendChart.resize();
        growthChart.resize();
    });

    $('deltaSel')?.addEventListener('change', () => {
        $('deltaMetric').value = $('deltaSel').value || '';
        pickGrowthDefaults();
    });

    $('baseSel')?.addEventListener('change', () => {
        $('baseMetric').value = $('baseSel').value || '';
    });

    refreshMeta();
</script>
</body>
</html>
