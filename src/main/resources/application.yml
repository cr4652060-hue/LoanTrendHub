spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/loantrendhub?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 900000
      pool-name: LoanTrendHubHikariPool

  sql:
    init:
      mode: always
      schema-locations: classpath:schema-mysql.sql
      continue-on-error: false

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 500MB
      file-size-threshold: 2MB

server:
  port: 18090
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    connection-timeout: 60000
    uri-encoding: UTF-8
    max-http-form-post-size: 1073741824
    max-swallow-size: -1
  error:
    include-message: always
    include-stacktrace: never

logging:
  level:
    org.springframework.jdbc.core: INFO
    com.zaxxer.hikari: INFO

app:
  upload:
    max-files: 200
  query:
    fill-missing-with-zero: true
    max-branch-series: 200
    max-points: 200000